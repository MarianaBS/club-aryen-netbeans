<!doctype html>
<html lang='es'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>ARYEN · Actividades</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/socio/menu'>ARYEN</a>
            </div>
        </nav>
        <div class='container py-3'>
            <div class='row'>
                <div class='col-md-8'>
                    <div class='card p-3'>
                        <h5>Listado de Actividades</h5>
                        <table class='table'>
                            <thead>
                                <tr>
                                    <th>Id</th>
                                    <th>Nombre</th>
                                    <th>Día y Hora</th>
                                    <th>Profesor</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody th:each='a : ${actividades}'>
                                <tr>
                                    <td th:text='${a.id}'></td>
                                    <td th:text='${a.nombre}'></td>
                                    <td th:text="${a.dia} + ' ' + ${#temporals.format(a.horario,'HH:mm')}"></td>
                                    <td th:text='${a.profesor}'></td>
                                    <td>
                                       <a th:href="@{/actividades}" 
                                           class="btn btn-sm btn-success">Inscribirme</a>

                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
