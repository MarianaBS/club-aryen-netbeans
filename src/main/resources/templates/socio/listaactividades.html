<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Actividades</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/socio/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
            <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Actividades disponibles</h1>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

    <form th:action="@{/socio/actividades/listar}" method="get" class="search-bar">
        <input type="text" name="q" th:value="${q}" placeholder="Buscar por nombre...">
        <button type="submit">Buscar</button>
        <a th:if="${q != null and !q.isEmpty()}" href="/socio/actividades/listar" class="btn btn-secondary btn-sm">✕ Limpiar</a>
    </form>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>Actividad</th>
                    <th>Día</th>
                    <th>Horario</th>
                    <th>Profesor/a</th>
                    <th>Lugares</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(actividades)}">
                    <td colspan="6" data-label="" style="text-align:center;color:var(--gray-500);padding:2rem">
                        No se encontraron actividades
                        <span th:if="${q != null and !q.isEmpty()}">
                            — <a th:href="@{/socio/actividades/listar}">Limpiar búsqueda</a>
                        </span>
                    </td>
                </tr>
                <tr th:each="a : ${actividades}" th:with="inscriptos=${inscriptosMap[a.id]}">
                    <td data-label="Actividad" style="font-weight:500" th:text="${a.nombre}"></td>
                    <td data-label="Día" th:text="${a.dia}"></td>
                    <td data-label="Horario"
                        th:text="${#temporals.format(a.horario,'HH:mm') + ' - ' + #temporals.format(a.horarioFin,'HH:mm')}"></td>
                    <td data-label="Profesor/a" th:text="${a.profesor}"></td>
                    <td data-label="Lugares">
                        <span th:if="${a.cupoMaximo == 0}" class="cupo-bar cupo-sin-limite">Libre</span>
                        <span th:unless="${a.cupoMaximo == 0}">
                            <span th:if="${inscriptos >= a.cupoMaximo}" class="badge badge-danger">Completa</span>
                            <span th:if="${inscriptos < a.cupoMaximo and inscriptos * 10 >= a.cupoMaximo * 8}"
                                  class="cupo-bar cupo-casi-lleno"
                                  th:text="${(a.cupoMaximo - inscriptos) + ' lugar' + (a.cupoMaximo - inscriptos == 1 ? '' : 'es')}">
                            </span>
                            <span th:if="${inscriptos < a.cupoMaximo and inscriptos * 10 < a.cupoMaximo * 8}"
                                  class="cupo-bar cupo-disponible"
                                  th:text="${(a.cupoMaximo - inscriptos) + ' lugar' + (a.cupoMaximo - inscriptos == 1 ? '' : 'es')}">
                            </span>
                        </span>
                    </td>
                    <td class="td-actions">
                        <!-- Activa y con lugar -->
                        <a th:if="${a.activo and (a.cupoMaximo == 0 or inscriptos < a.cupoMaximo)}"
                           th:href="@{/socio/inscripciones/inscribirse/{id}(id=${a.id})}"
                           class="btn btn-primary btn-sm">Inscribirme</a>
                        <!-- Activa pero completa -->
                        <span th:if="${a.activo and a.cupoMaximo > 0 and inscriptos >= a.cupoMaximo}"
                              class="badge badge-danger">Sin lugar</span>
                        <!-- Inactiva -->
                        <span th:unless="${a.activo}" class="badge badge-gray">Inactiva</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/socio/menu" class="btn btn-secondary mt-3">← Volver</a>
</div>
</body>
</html>
