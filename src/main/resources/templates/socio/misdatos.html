<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Mis datos</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
    <script src="/js/password-toggle.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/socio/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Mis datos</h1>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card form-max">
        <div class="card-body">
            <form th:action="@{/socio/mis-datos/guardar}" method="post">

                <!-- Datos personales -->
                <p style="font-size:.8rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem">Datos de contacto</p>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           th:value="${socio?.email}" placeholder="correo@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control"
                           th:value="${socio?.telefono}" placeholder="Ej: 341 1234567">
                </div>
                <div class="mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" name="direccion" class="form-control"
                           th:value="${socio?.direccion}" placeholder="Ej: San Martín 123">
                </div>

                <hr class="divider">

                <!-- Cambiar contraseña -->
                <p style="font-size:.8rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem">Cambiar contraseña</p>
                <p class="text-muted" style="margin-bottom:.75rem">Dejá estos campos vacíos si no querés cambiar la contraseña.</p>

                <div class="mb-3">
                    <label class="form-label">Contraseña actual</label>
                    <div class="password-wrapper">
                        <input id="passwordActual" type="password" name="passwordActual" class="form-control" placeholder="••••••••">
                        <button type="button" class="toggle-password" data-target="passwordActual" tabindex="-1">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nueva contraseña</label>
                    <div class="password-wrapper">
                        <input id="passwordNueva" type="password" name="passwordNueva" class="form-control" placeholder="••••••••">
                        <button type="button" class="toggle-password" data-target="passwordNueva" tabindex="-1">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <hr class="divider">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Guardar cambios</button>
                    <a href="/socio/menu" class="btn btn-secondary">← Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
