<!DOCTYPE html>
<html lang='es'>
    <head>
        <link 
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet" 
            crossorigin="anonymous">
        <link rel="stylesheet" href="../static/css/custom.css" type="text/css"/>
        <meta charset="UTF-8">
        <title>Menú Socios</title>
    </head>
    <body>
        <h2>Bienvenido, <span sec:authentication="name"></span></h2>
        <div class="d-flex">
            <div class="btn-group">
                <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
                    Actividades
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" th:href="@{/socio/actividades/listar}">Listado</a></li>
                </ul>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
                    Mi Cuenta
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" th:href="@{/socio/actividades}">Inscripciones</a></li>
                    <li><a class="dropdown-item" th:href="@{/socio}">Datos Personales</a></li>
                </ul>
            </div>
        </div>


        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-danger">Cerrar sesión</button>
        </form>


        <script 
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            crossorigin="anonymous">
        </script>
    </body>
</html>
