<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Mi cuenta</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/socio/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="menu-wrapper">
    <p class="menu-welcome">Hola, <span sec:authentication="name"></span> 👋</p>
    <p class="menu-subtitle">¿Qué querés hacer hoy?</p>

    <div class="menu-grid" style="max-width:520px; grid-template-columns: repeat(3, 1fr)">
        <a href="/socio/actividades/listar" class="menu-card">
            <span class="menu-card-icon">🏃</span>
            <p class="menu-card-title">Actividades</p>
            <p class="menu-card-sub">Ver e inscribirte</p>
        </a>
        <a href="/socio/inscripciones/listar" class="menu-card">
            <span class="menu-card-icon">📋</span>
            <p class="menu-card-title">Mis inscripciones</p>
            <p class="menu-card-sub">Ver y darte de baja</p>
        </a>
        <a href="/socio/mis-datos" class="menu-card">
            <span class="menu-card-icon">👤</span>
            <p class="menu-card-title">Mis datos</p>
            <p class="menu-card-sub">Editar perfil</p>
        </a>
    </div>
</div>
</body>
</html>
