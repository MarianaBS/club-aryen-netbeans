<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Mis inscripciones</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/socio/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:36px"></a>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Mis inscripciones</h1>
        <a href="/socio/actividades/listar" class="btn btn-primary btn-sm">+ Inscribirme a más</a>
    </div>

    <div th:if="${#lists.isEmpty(inscripciones)}" class="alert alert-info">
        Todavía no estás inscripto en ninguna actividad.
        <a th:href="@{/socio/actividades/listar}">Ver actividades →</a>
    </div>

    <div th:unless="${#lists.isEmpty(inscripciones)}" class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>Actividad</th>
                    <th>Día</th>
                    <th>Horario</th>
                    <th>Profesor/a</th>
                    <th>Inscripto el</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="i : ${inscripciones}">
                    <td data-label="Actividad" style="font-weight:500" th:text="${i.actividad.nombre}"></td>
                    <td data-label="Día" th:text="${i.actividad.dia}"></td>
                    <td data-label="Horario" th:text="${#temporals.format(i.actividad.horario,'HH:mm')}"></td>
                    <td data-label="Profesor/a" th:text="${i.actividad.profesor}"></td>
                    <td data-label="Fecha" class="text-muted" th:text="${#temporals.format(i.fecha,'dd/MM/yyyy')}"></td>
                    <td class="td-actions">
                        <a th:href="@{/socio/inscripciones/eliminar/{id}(id=${i.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Querés darte de baja de esta actividad?')">Darme de baja</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/socio/menu" class="btn btn-secondary mt-3">← Volver</a>
</div>
</body>
</html>
