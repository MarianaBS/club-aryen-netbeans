<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Error</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
    </div>
</nav>
<div style="min-height:calc(100vh - 56px); display:flex; align-items:center; justify-content:center; padding:2rem">
    <div style="text-align:center; max-width:420px">
        <div style="font-size:4rem; font-weight:800; color:var(--primary); line-height:1" th:text="${codigo}">Error</div>
        <h2 style="margin:.5rem 0 1rem; font-size:1.4rem; color:var(--gray-900)" th:text="${titulo}">Error</h2>
        <p style="color:var(--gray-500); margin-bottom:2rem" th:text="${mensaje}">Ocurrió un error.</p>
        <a href="javascript:history.back()" class="btn btn-secondary" style="margin-right:.5rem">← Volver</a>
        <a href="/" class="btn btn-primary">Ir al inicio</a>
    </div>
</div>
</body>
</html>
