<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Iniciar sesión</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">ARYEN</div>
        <p class="login-tagline">Sistema de gestión del club</p>

        <div th:if="${param.error}" class="alert alert-danger" style="text-align:center">
            Usuario o contraseña incorrectos
        </div>
        <div th:if="${param.logout}" class="alert alert-success" style="text-align:center">
            Sesión cerrada correctamente
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input name="username" type="text" class="form-control" placeholder="Tu usuario" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input name="password" type="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-w100 btn-lg mt-2">Ingresar</button>
        </form>
    </div>
</div>
</body>
</html>
