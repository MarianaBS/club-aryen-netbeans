<!doctype html>
<html lang='es'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>ARYEN · Login</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/static.css/custom.css'>
        <link rel="stylesheet" href="../static/css/custom.css" type="text/css"/>

    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/'>ARYEN</a>
            </div>
        </nav>

        <div class='container' style='max-width:420px;margin-top:60px'>
            <div class='card p-3'>
                <h2 style="align-self: center">Iniciar Sesión</h2>
                <!-- 🔹 Muestra mensaje si hay error -->
                <div th:if="${param.error}" class="alert alert-danger text-center">
                    Usuario y/o contraseña incorrectos
                </div>

                <form th:action="@{/login}" method="post">
                    <input name='username' class='form-control mb-2' placeholder='Usuario' required>
                    <input name='password' class='form-control mb-2' type='password' placeholder='Contraseña' required>
                    <button class='btn btn-primary w-100'>Ingresar</button>
                </form>
            </div>
        </div>
    </body>
</html>
