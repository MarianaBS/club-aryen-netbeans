<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Confirmar baja</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Confirmar baja de socio</h1>
    </div>

    <div class="card form-max" style="max-width:600px">
        <div class="card-body">

            <!-- Datos del socio -->
            <div style="display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--gray-100)">
                <span class="text-muted">Socio</span>
                <span style="font-weight:600" th:text="${socio.apellido + ', ' + socio.nombre}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--gray-100)">
                <span class="text-muted">DNI</span>
                <span th:text="${socio.dni}"></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--gray-100);margin-bottom:1.25rem">
                <span class="text-muted">Email</span>
                <span th:text="${socio.email}"></span>
            </div>

            <!-- Sin inscripciones -->
            <div th:if="${#lists.isEmpty(inscripciones)}"
                 class="alert alert-success" style="margin-bottom:1.25rem">
                ✓ Este socio no tiene inscripciones activas. Se puede dar de baja sin impacto.
            </div>

            <!-- Con inscripciones — advertencia -->
            <div th:unless="${#lists.isEmpty(inscripciones)}"
                 class="alert alert-danger" style="margin-bottom:1rem">
                ⚠️ Este socio tiene
                <strong th:text="${inscripciones.size()}"></strong>
                inscripción<span th:if="${inscripciones.size() > 1}">es</span>
                activa<span th:if="${inscripciones.size() > 1}">s</span>
                que se eliminarán al confirmar la baja.
            </div>

            <div th:unless="${#lists.isEmpty(inscripciones)}" class="card" style="margin-bottom:1.25rem">
                <table class="table" style="margin:0;font-size:.875rem">
                    <thead>
                        <tr>
                            <th>Actividad</th>
                            <th>Día</th>
                            <th>Horario</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="i : ${inscripciones}">
                            <td th:text="${i.actividad.nombre}"></td>
                            <td th:text="${i.actividad.dia}"></td>
                            <td th:text="${#temporals.format(i.actividad.horario,'HH:mm') + ' - ' + #temporals.format(i.actividad.horarioFin,'HH:mm')}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <hr class="divider">

            <form th:action="@{/admin/socios/eliminar/{id}(id=${socio.id})}" method="post">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        Confirmar baja
                        <span th:if="${!#lists.isEmpty(inscripciones)}">
                            y eliminar <span th:text="${inscripciones.size()}"></span>
                            inscripción<span th:if="${inscripciones.size() > 1}">es</span>
                        </span>
                    </button>
                    <a href="/admin/socios/listar" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>

        </div>
    </div>
</div>
</body>
</html>
