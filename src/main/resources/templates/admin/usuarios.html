<html>
    <head>
        <title>ARYEN - Usuarios</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/admin/menu'>ARYEN</a>
            </div>
        </nav>
        <div class="container mt-5">
            <h2 th:text="${usuario.id} != null ? 'Editar Usuario' : 'Nuevo Usuario'"></h2>

            <form th:action="${usuario.id != null} ? @{/admin/usuarios/editar/{id}(id=${usuario.id})} : @{/admin/usuarios/guardar}"
                  th:object="${usuario}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label">Nombre de Usuario</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="${usuario.id != null} ? 'Nueva Contraseña (opcional)' : 'Contraseña'"></label>
                    <input type="text" th:field="*{password}" class="form-control" th:attr="required=${usuario.id == null}">
                </div>
                <div class="mb-3">
                    <label>Repetir contraseña:</label>
                    <input type="password" th:field="*{repetirPassword}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Rol:</label>
                    <select th:field="*{rol}" class="form-control" required>
                        <option value="">Seleccionar...</option>
                        <option value="ADMIN">Administrador</option>
                        <option value="SOCIO">Socio</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Socio:</label>
                    <select th:field="*{socio.id}" class="form-select">
                        <option value="">-- Seleccionar Socio --</option>
                        <option th:each="s : ${socios}" 
                                th:value="${s.id}" 
                                th:text="${s.nombre + ' ' + s.apellido}">
                                th:selected="${usuario.socio != null and s.id == usuario.socio.id}">
                        </option>
                    </select>
                </div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <button type="submit" class="btn btn-success"onclick="return validarPasswords()">Guardar</button>
                <button class="btn btn-secondary" onclick="window.history.back()">Cancelar</button>

            </form>
        </div>

        <script>
            function validarPasswords() {
                const pass = document.getElementById('password').value;
                const confirm = document.getElementById('confirmPassword').value;

                if (!pass && !confirm)
                    return true; // si están vacías (edición sin cambio)
                if (pass !== confirm) {
                    document.getElementById('error-msg').style.display = 'block';
                    return false;
                }
                return true;
            }
        </script>

    </body>
</html>
