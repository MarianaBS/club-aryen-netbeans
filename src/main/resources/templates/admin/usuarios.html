<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Usuario</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:36px"></a>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title" th:text="${usuario.id} != null ? 'Editar usuario' : 'Nuevo usuario'"></h1>
    </div>

    <div class="card form-max">
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="${usuario.id != null} ? @{/admin/usuarios/guardar} : @{/admin/usuarios/guardar}"
                  th:object="${usuario}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Nombre de usuario</label>
                    <input type="text" th:field="*{username}" class="form-control" placeholder="usuario123" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="${usuario.id != null} ? 'Nueva contraseña (dejar vacío para no cambiar)' : 'Contraseña'"></label>
                    <input type="password" th:field="*{password}" class="form-control"
                           th:attr="required=${usuario.id == null}" placeholder="••••••••">
                </div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select th:field="*{rol}" class="form-select" required>
                        <option value="">-- Seleccioná --</option>
                        <option value="ADMIN">Administrador</option>
                        <option value="SOCIO">Socio</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Socio vinculado <span class="text-muted">(opcional)</span></label>
                    <select th:field="*{socio.id}" class="form-select">
                        <option value="">-- Sin vincular --</option>
                        <option th:each="s : ${socios}"
                                th:value="${s.id}"
                                th:text="${s.apellido + ', ' + s.nombre}">
                        </option>
                    </select>
                </div>

                <hr class="divider">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="/admin/usuarios/listar" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
