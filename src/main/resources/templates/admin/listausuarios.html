<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Usuarios</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Usuarios</h1>
        <a href="/admin/usuarios/nuevo" class="btn btn-primary btn-sm">+ Nuevo usuario</a>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Socio vinculado</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="4" data-label="" style="text-align:center;color:var(--gray-500);padding:2rem">No hay usuarios registrados</td>
                </tr>
                <tr th:each="u : ${usuarios}">
                    <td data-label="Usuario" style="font-weight:500" th:text="${u.username}"></td>
                    <td data-label="Rol">
                        <span th:if="${u.rol == 'ADMIN'}" class="badge badge-primary">Admin</span>
                        <span th:unless="${u.rol == 'ADMIN'}" class="badge badge-gray">Socio</span>
                    </td>
                    <td data-label="Socio" class="text-muted" th:text="${u.socio != null ? u.socio.apellido + ', ' + u.socio.nombre : '—'}"></td>
                    <td class="td-actions">
                        <a th:href="@{/admin/usuarios/editar/{id}(id=${u.id})}" class="btn btn-secondary btn-sm">Editar</a>
                        <a th:href="@{/admin/usuarios/eliminar/{id}(id=${u.id})}"
                           class="btn btn-danger btn-sm confirm-action" data-title="¿Eliminar usuario?" data-msg="Se eliminará el acceso de este usuario al sistema.">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/admin/menu" class="btn btn-secondary mt-3">← Volver</a>
</div>
<script src="/js/confirm-modal.js"></script>
</body>
</html>
