<!doctype html>
<html lang='es'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>ARYEN · Usuarios</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/admin/menu'>ARYEN</a>
            </div>
        </nav>
        <div class='container py-3'>
            <div class='row'>
                <div class='col-md-8'>
                    <div class='card p-3'>
                        <h5>Listado de Usuarios</h5>
                        <table class='table'>
                            <thead>
                                <tr>
                                    <th>Username</th>
                                    <th>Rol</th>
                                    <th>Socio</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody th:each='u : ${usuarios}'>
                                <tr>
                                    <td th:text='${u.username}'></td>
                                    <td th:text='${u.rol}'></td>
                                    <td th:text="${u.socio != null ? u.socio.nombre + ' ' + u.socio.apellido : 'Sin socio'}"></td>
                                    <td>
                                        <!-- Botón Editar -->
                                        <a th:href="@{/admin/usuarios/editar/{id}(id=${u.id})}" 
                                           class="btn btn-sm btn-warning">Editar</a>

                                        <!-- Botón Eliminar -->
                                        <a th:href="@{/admin/usuarios/eliminar/{id}(id=${u.id})}"
                                           class="btn btn-sm btn-danger"
                                           onclick="return confirm('¿Desea eliminar este usuario?')">
                                            Eliminar
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
