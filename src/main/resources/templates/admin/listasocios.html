<!doctype html>
<html lang='es'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>ARYEN · Socios</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/admin/menu'>ARYEN</a>
            </div>
        </nav>
        <div class='container py-3'>
            <div class='row'>
                <div class='col-md-8'>
                    <div class='card p-3'>
                        <h5>Listado de Socios</h5>
                        <table class='table'>
                            <thead>
                                <tr>
                                    <th>Id</th>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th>DNI</th>
                                    <th></th> 
                                </tr>
                            </thead>
                            <tbody th:each='s : ${socios}'>
                                <tr>
                                    <td th:text="${s.id}"></td>
                                    <td th:text="|${s.nombre} ${s.apellido}|"></td>
                                    <td th:text='${s.email}'></td>
                                    <td th:text='${s.dni}'></td>
                                    <td>
                                        <!-- Botón Editar -->
                                        <a th:href="@{/admin/socios/editar/{id}(id=${s.id})}" 
                                           class="btn btn-sm btn-warning">Editar</a>

                                        <!-- Botón Eliminar -->
                                        <a th:href="@{/admin/socios/eliminar/{id}(id=${s.id})}"
                                           class="btn btn-sm btn-danger"
                                           onclick="return confirm('¿Desea eliminar este socio?')">
                                            Eliminar
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
