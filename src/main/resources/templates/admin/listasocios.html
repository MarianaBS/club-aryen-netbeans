<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Socios</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:36px"></a>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Socios</h1>
        <a href="/admin/socios/nuevo" class="btn btn-primary btn-sm">+ Nuevo socio</a>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>DNI</th>
                    <th>Estado</th>
                    <th>Alta</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(socios)}">
                    <td colspan="6" data-label="" style="text-align:center;color:var(--gray-500);padding:2rem">No hay socios registrados</td>
                </tr>
                <tr th:each="s : ${socios}">
                    <td data-label="Nombre" style="font-weight:500" th:text="${s.apellido + ', ' + s.nombre}"></td>
                    <td data-label="Email" th:text="${s.email}"></td>
                    <td data-label="DNI" th:text="${s.dni}"></td>
                    <td data-label="Estado">
                        <span th:if="${s.activo}" class="badge badge-success">Activo</span>
                        <span th:unless="${s.activo}" class="badge badge-danger">Inactivo</span>
                    </td>
                    <td data-label="Alta" class="text-muted" th:text="${#temporals.format(s.fechaAlta,'dd/MM/yyyy')}"></td>
                    <td class="td-actions">
                        <a th:href="@{/admin/socios/editar/{id}(id=${s.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/admin/socios/eliminar/{id}(id=${s.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Desactivar este socio?')">Baja</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/admin/menu" class="btn btn-secondary mt-3">← Volver</a>
</div>
</body>
</html>
