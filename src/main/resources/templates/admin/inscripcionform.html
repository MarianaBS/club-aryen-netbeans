<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Confirmar Inscripción</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/socio/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
            <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Confirmar Inscripción</h1>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <strong>No se pudo inscribir:</strong> <span th:text="${error}"></span>
    </div>

    <div class="card form-max">
        <div class="card-body">
            <p class="text-muted" style="margin-bottom:1.25rem">Revise los datos antes de confirmar.</p>

            <div style="display:grid; gap:.75rem; margin-bottom:1.5rem">
                <div style="display:flex; justify-content:space-between; padding:.6rem 0; border-bottom:1px solid var(--gray-100)">
                    <span class="text-muted">Socio</span>
                    <span style="font-weight:500"
                          th:text="${inscripcion.socio.nombre + ' ' + inscripcion.socio.apellido}"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:.6rem 0; border-bottom:1px solid var(--gray-100)">
                    <span class="text-muted">Actividad</span>
                    <span style="font-weight:500" th:text="${inscripcion.actividad.nombre}"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:.6rem 0; border-bottom:1px solid var(--gray-100)">
                    <span class="text-muted">Día</span>
                    <span th:text="${inscripcion.actividad.dia}"></span>
                </div>
                <div style="display:flex; justify-content:space-between; padding:.6rem 0; border-bottom:1px solid var(--gray-100)">
                    <span class="text-muted">Horario</span>
                    <span th:text="${#temporals.format(inscripcion.actividad.horario,'HH:mm')
                                   + ' - '
                                   + #temporals.format(inscripcion.actividad.horarioFin,'HH:mm')}">
                    </span>
                </div>
                <!-- Cupo disponible -->
                <div th:if="${inscripcion.actividad.cupoMaximo > 0}"
                     style="display:flex; justify-content:space-between; padding:.6rem 0">
                    <span class="text-muted">Lugares disponibles</span>
                    <span th:with="libres=${inscripcion.actividad.cupoMaximo - inscriptos}"
                          th:classappend="${libres <= 2} ? 'cupo-casi-lleno' : 'cupo-disponible'"
                          style="font-weight:500"
                          th:text="${libres + ' de ' + inscripcion.actividad.cupoMaximo}">
                    </span>
                </div>
                <div th:unless="${inscripcion.actividad.cupoMaximo > 0}"
                     style="display:flex; justify-content:space-between; padding:.6rem 0">
                    <span class="text-muted">Lugares</span>
                    <span class="cupo-sin-limite">Sin límite</span>
                </div>
            </div>

            <!--
                Si hay error: ocultar el botón confirmar y mostrar solo Volver.
                No tiene sentido intentar confirmar de nuevo la misma inscripción que ya falló.
            -->
            <div th:if="${error}" class="d-flex gap-2">
                <a href="/socio/actividades/listar" class="btn btn-primary">Ver otras actividades</a>
                <a href="/socio/inscripciones/listar" class="btn btn-secondary">← Mis Inscripciones</a>
            </div>

            <form th:unless="${error}" th:action="@{/inscripciones/guardar}" method="post">
                <input type="hidden" name="socioId"     th:value="${inscripcion.socio.id}"/>
                <input type="hidden" name="actividadId" th:value="${inscripcion.actividad.id}"/>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Confirmar Inscripción</button>
                    <a href="/socio/actividades/listar" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>

        </div>
    </div>
</div>
</body>
</html>
