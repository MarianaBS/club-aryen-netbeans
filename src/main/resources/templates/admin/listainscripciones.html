<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Inscripciones</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
            <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Inscripciones</h1>
        <a href="/admin/inscripciones/nuevo" class="btn btn-primary btn-sm">+ Nueva Inscripción</a>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>Socio</th>
                    <th>Actividad</th>
                    <th>Día</th>
                    <th>Horario</th>
                    <th>Fecha</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(inscripciones)}">
                    <td colspan="6" data-label="" style="text-align:center;color:var(--gray-500);padding:2rem">No hay inscripciones registradas</td>
                </tr>
                <tr th:each="i : ${inscripciones}">
                    <td data-label="Socio" style="font-weight:500" th:text="${i.socio.apellido + ', ' + i.socio.nombre}"></td>
                    <td data-label="Actividad" th:text="${i.actividad.nombre}"></td>
                    <td data-label="Día" th:text="${i.actividad.dia}"></td>
                    <td data-label="Horario" th:text="${#temporals.format(i.actividad.horario,'HH:mm')}"></td>
                    <td data-label="Fecha" class="text-muted" th:text="${#temporals.format(i.fecha,'dd/MM/yyyy')}"></td>
                    <td class="td-actions">
                        <a th:href="@{/admin/inscripciones/eliminar/{id}(id=${i.id})}"
                           class="btn btn-danger btn-sm confirm-action" data-title="¿Eliminar inscripción?" data-msg="Se eliminará la inscripción del sistema.">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/admin/menu" class="btn btn-secondary mt-3">← Volver</a>
</div>
<script src="/js/confirm-modal.js"></script>
</body>
</html>
