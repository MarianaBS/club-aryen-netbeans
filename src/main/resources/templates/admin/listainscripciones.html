<!doctype html>
<html lang='es'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>ARYEN · Listado Inscripciones</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <nav class='navbar'>
        <div class='container'>
            <a class='navbar-brand' href='/admin/menu'>ARYEN</a>
        </div>
    </nav>
    <div class='container py-3'>
        <div class='row'>
            <div class='col-md-8'>
                <div class='card p-3'>
                    <h5>Listado de Inscripciones</h5>
                    <table class='table'>
                        <thead>
                            <tr>
                                <th>Socio</th>
                                <th>Actividad</th>
                                <th>Día</th>
                                <th>Horario</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody th:each='i : ${inscripciones}'>
                            <tr>
                                <td th:text="${i.socio.nombre + ' ' + i.socio.apellido}"></td>
                                <td th:text="${i.actividad.nombre}"></td>
                                <td th:text="${i.actividad.dia}"></td>
                                <td th:text="${#temporals.format(i.horario,'HH:mm')}"></td>
                                <td>

                                    <!-- Botón Eliminar -->
                                    <a th:href="@{/admin/inscripciones/eliminar/{id}(id=${i.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('¿Desea eliminar esta inscripción?')">
                                        Eliminar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</html>
