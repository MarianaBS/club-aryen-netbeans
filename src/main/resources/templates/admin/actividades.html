<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Actividad</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
            <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title" th:text="${actividad.id} != null ? 'Editar actividad' : 'Nueva actividad'"></h1>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card form-max">
        <div class="card-body">
            <form th:action="@{/admin/actividades/guardar}" th:object="${actividad}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Yoga, Natación..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Día</label>
                    <select th:field="*{dia}" class="form-select" required>
                        <option value="">-- Seleccioná --</option>
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miercoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sabado">Sábado</option>
                    </select>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem" class="mb-3">
                    <div>
                        <label class="form-label">Horario de Inicio</label>
                        <input type="time" th:field="*{horario}" class="form-control" id="horarioInicio" required>
                    </div>
                    <div>
                        <label class="form-label">Horario de Fin</label>
                        <input type="time" th:field="*{horarioFin}" class="form-control" id="horarioFin" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Profesor/a</label>
                    <input type="text" th:field="*{profesor}" class="form-control" placeholder="Nombre del profesor/a" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cupo Máximo <span class="text-muted">(0 = sin límite)</span></label>
                    <input type="number" th:field="*{cupoMaximo}" class="form-control"
                           min="0" placeholder="0" style="max-width:140px">
                </div>

                <hr class="divider">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="/admin/actividades/listar" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
    <a href="/admin/actividades/listar" class="btn btn-secondary mt-3">← Volver al listado</a>
</div>
<script>
(function() {
    var inicio = document.getElementById('horarioInicio');
    var fin    = document.getElementById('horarioFin');
    if (!inicio || !fin) return;

    function validar() {
        if (inicio.value && fin.value && fin.value <= inicio.value) {
            fin.setCustomValidity('El Horario de Fin debe ser posterior al Horario de Inicio.');
        } else {
            fin.setCustomValidity('');
        }
    }
    inicio.addEventListener('change', validar);
    fin.addEventListener('change', validar);
})();
</script>
</body>
</html>
