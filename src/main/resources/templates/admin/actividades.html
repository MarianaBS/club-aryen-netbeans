<!doctype html>
<html lang='es'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>ARYEN · Actividades</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/admin/menu'>ARYEN</a>
            </div>
        </nav>
        <div class="container mt-5">
            <h2 th:text="${actividad.id} != null ? 'Editar Actividad' : 'Nueva Actividad'"></h2>

            <form th:action="@{/admin/actividades/guardar}" th:object="${actividad}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="dia" class="form-label">Día</label>
                    <select id="dia" th:field="*{dia}" class="form-select" required>
                        <option value="">-- Seleccione --</option>
                        <option value="Lunes">Lunes</option>
                        <option value="Martes">Martes</option>
                        <option value="Miercoles">Miércoles</option>
                        <option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option>
                        <option value="Sabado">Sábado</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Horario</label>
                    <input type="time" th:field="*{horario}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Profesor</label>
                    <input type="text" th:field="*{profesor}" class="form-control" required>
                </div>

                <button type="submit" class='btn btn-success '>Guardar</button>
                <a th:href="@{/admin/actividades/listar}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </body>
</html>
