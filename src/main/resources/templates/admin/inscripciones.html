<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <title>ARYEN - INcripciones)</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/admin/menu'>ARYEN</a>
            </div>
        </nav>
        <div class="container mt-5">
            <h2 th:text="${inscripcion.id} != null ? 'Editar Inscripción' : 'Nueva Inscripción'"></h2>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/admin/inscripciones/guardar}" th:object="${inscripcion}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label>Socio</label>
                    <select th:field="*{socio.id}" class="form-select">
                        <option th:each="s: ${socios}" th:value="${s.id}" th:text="${s.nombre + ' ' + s.apellido}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Actividad</label>
                    <select th:field="*{actividad.id}" class="form-select">
                        <option th:each="a: ${actividades}" th:value="${a.id}" th:text="${a.nombre}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Día</label>
                    <input type="text" th:field="*{actividad.dia}" class="form-control"/>
                </div>
                <div class="mb-3">
                    <label>Horario</label>
                    <input type="time" th:field="*{actividad.horario}" class="form-control"/>
                </div>

                <button class="btn btn-success" type="submit">Guardar</button>
                <button class="btn btn-secondary" onclick="window.history.back()">Cancelar</button>

            </form>
        </div>
    </body>
</html>
