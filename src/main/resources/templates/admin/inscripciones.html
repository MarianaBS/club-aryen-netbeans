<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Nueva Inscripción</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
            <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Nueva Inscripción</h1>
    </div>

    <div class="card form-max">
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/inscripciones/guardar}" method="post">
                <div class="mb-3">
                    <label class="form-label">Socio</label>
                    <select name="socioId" class="form-select" required>
                        <option value="">-- Seleccione un socio --</option>
                        <option th:each="s : ${socios}"
                                th:value="${s.id}"
                                th:selected="${inscripcion != null and inscripcion.socio != null and inscripcion.socio.id == s.id}"
                                th:text="${s.apellido + ', ' + s.nombre}">
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Actividad</label>
                    <select name="actividadId" class="form-select" required>
                        <option value="">-- Seleccione una actividad --</option>
                        <option th:each="a : ${actividades}"
                                th:value="${a.id}"
                                th:selected="${inscripcion != null and inscripcion.actividad != null and inscripcion.actividad.id == a.id}"
                                th:text="${a.nombre + ' · ' + a.dia
                                          + ' ' + #temporals.format(a.horario,'HH:mm')
                                          + '-' + #temporals.format(a.horarioFin,'HH:mm')}">
                        </option>
                    </select>
                </div>

                <hr class="divider">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="/admin/inscripciones/listar" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
    <a href="/admin/inscripciones/listar" class="btn btn-secondary mt-3">← Volver al Listado</a>
</div>
</body>
</html>
