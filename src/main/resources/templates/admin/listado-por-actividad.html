<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Inscripciones por Actividad</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
            <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Inscripciones por Aactividad</h1>
        <a href="/admin/listados/por-socio" class="btn btn-secondary btn-sm">Ver por Socio →</a>
    </div>

    <!-- Resumen general -->
    <div class="resumen-bar">
        <span>Total Actividades: <strong th:text="${totalActividades}"></strong></span>
        <span>Total Inscripciones: <strong th:text="${totalInscripciones}"></strong></span>
    </div>

    <div class="accordion" id="acordeonActividades">
        <div th:each="entrada, iterStat : ${mapa}" class="accordion-item">

            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        th:data-bs-target="'#act-' + ${iterStat.index}"
                        th:aria-expanded="false">

                    <div style="display:flex;flex-direction:column;gap:2px;flex:1">
                        <div style="display:flex;align-items:center;gap:.6rem">
                            <span style="font-weight:600" th:text="${entrada.key.nombre}"></span>
                            <span th:if="${entrada.key.activo}" class="badge badge-success">Activa</span>
                            <span th:unless="${entrada.key.activo}" class="badge badge-danger">Inactiva</span>
                        </div>
                        <span class="act-meta"
                              th:text="${entrada.key.dia
                                        + ' · '
                                        + #temporals.format(entrada.key.horario,'HH:mm')
                                        + ' - '
                                        + #temporals.format(entrada.key.horarioFin,'HH:mm')
                                        + ' · Prof. '
                                        + entrada.key.profesor}">
                        </span>
                    </div>

                    <!-- Subtotal compacto visible siempre -->
                    <span class="badge"
                          th:classappend="${entrada.value.isEmpty()} ? 'badge-gray' : 'badge-primary'"
                          th:text="${entrada.value.size() + ' inscripto' + (entrada.value.size() == 1 ? '' : 's')}"
                          style="white-space:nowrap">
                    </span>

                </button>
            </h2>

            <div th:id="'act-' + ${iterStat.index}"
                 class="accordion-collapse collapse"
                 data-bs-parent="#acordeonActividades">
                <div class="accordion-body">

                    <div th:if="${entrada.value.isEmpty()}" class="sin-inscripciones">
                        Sin inscriptos todavía
                    </div>

                    <table th:unless="${entrada.value.isEmpty()}" class="table" style="margin:0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Socio</th>
                                <th>Email</th>
                                <th>Inscripto el</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="i, stat : ${entrada.value}">
                                <td class="text-muted" style="width:40px" th:text="${stat.count}"></td>
                                <td style="font-weight:500"
                                    th:text="${i.socio.apellido + ', ' + i.socio.nombre}"></td>
                                <td class="text-muted" th:text="${i.socio.email}"></td>
                                <td class="text-muted" th:text="${#temporals.format(i.fecha,'dd/MM/yyyy')}"></td>
                            </tr>
                        </tbody>
                    </table>

                    <!-- Subtotal con nota de cupo para el futuro -->
                    <div th:unless="${entrada.value.isEmpty()}" class="subtotal-bar">
                        <div class="cupo-info">
                            <span>Inscriptos: <strong th:text="${entrada.value.size()}"></strong></span>
                            <!-- Cuando se agregue cupo máximo, acá iría:
                            <span class="text-muted">/ <strong th:text="${entrada.key.cupoMaximo}"></strong> cupos</span>
                            <span class="badge badge-success" th:if="${entrada.value.size() < entrada.key.cupoMaximo}">Con lugar</span>
                            <span class="badge badge-danger" th:if="${entrada.value.size() >= entrada.key.cupoMaximo}">Completo</span>
                            -->
                        </div>
                        <span class="text-muted" th:text="${entrada.key.dia + ' ' + #temporals.format(entrada.key.horario,'HH:mm')}"></span>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <a href="/admin/listados" class="btn btn-secondary mt-3">← Volver a Listados</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
