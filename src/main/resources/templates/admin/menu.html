<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Menú Admin</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="menu-wrapper">
    <p class="menu-welcome">
        Bienvenido, <span th:text="${nombreCompleto}">Admin</span><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round"
                 style="color:var(--primary);vertical-align:middle;margin-left:.35rem">
                <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/>
                <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
                <path d="M10 10.5a2 2 0 0 0-2-2 2 2 0 0 0-2 2v3"/>
                <path d="M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
            </svg>
    </p>
    <p class="menu-subtitle">Panel de administración</p>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" th:text="${totalSocios}">0</div>
            <div class="stat-label">Socios activos</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" th:text="${totalActividades}">0</div>
            <div class="stat-label">Actividades</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" th:text="${totalInscripciones}">0</div>
            <div class="stat-label">Inscripciones</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" th:text="${totalUsuarios}">0</div>
            <div class="stat-label">Usuarios</div>
        </div>
    </div>

    <div class="menu-grid" style="max-width:660px; grid-template-columns: repeat(3,1fr)">

        <a href="/admin/socios/listar" class="menu-card">
            <span class="menu-card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            </span>
            <p class="menu-card-title">Socios</p>
            <p class="menu-card-sub">Alta, edición y baja</p>
        </a>

        <a href="/admin/actividades/listar" class="menu-card">
            <span class="menu-card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </span>
            <p class="menu-card-title">Actividades</p>
            <p class="menu-card-sub">Gestión de clases</p>
        </a>

        <a href="/admin/inscripciones/listar" class="menu-card">
            <span class="menu-card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="9" y1="13" x2="15" y2="13"/>
                    <line x1="9" y1="17" x2="15" y2="17"/>
                    <line x1="9" y1="9" x2="11" y2="9"/>
                </svg>
            </span>
            <p class="menu-card-title">Inscripciones</p>
            <p class="menu-card-sub">Socios por actividad</p>
        </a>

        <a href="/admin/usuarios/listar" class="menu-card">
            <span class="menu-card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </span>
            <p class="menu-card-title">Usuarios</p>
            <p class="menu-card-sub">Accesos y roles</p>
        </a>

        <a href="/admin/listados" class="menu-card">
            <span class="menu-card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="20" x2="18" y2="10"/>
                    <line x1="12" y1="20" x2="12" y2="4"/>
                    <line x1="6" y1="20" x2="6" y2="14"/>
                </svg>
            </span>
            <p class="menu-card-title">Listados</p>
            <p class="menu-card-sub">Por socio o actividad</p>
        </a>

    </div>
</div>
</body>
</html>
