<!doctype html>
<html lang='es'>
    <head>
        <meta charset='utf-8'>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <title>ARYEN · Socios</title>
        <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='/css/custom.css'>
    </head>
    <body>
        <nav class='navbar'>
            <div class='container'>
                <a class='navbar-brand' href='/admin/menu'>ARYEN</a>
            </div>
        </nav>
        <div class="container mt-5">
            <h2 th:text="${socio.id} != null ? 'Editar Socio' : 'Nuevo Socio'"></h2>

            <form th:action="@{/admin/socios/guardar}" th:object="${socio}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Apellido</label>
                    <input type="text" th:field="*{apellido}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">DNI</label>
                    <input type="text" th:field="*{dni}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                </div>
                
                <button type="submit" class='btn btn-success '>Guardar</button>
                <a th:href="@{/admin/socios/listar}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </body>
</html>
