<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Socio</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
            <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" class="btn-logout">Cerrar Sesión</button>
        </form>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title" th:text="${socio.id} != null ? 'Editar Socio' : 'Nuevo Socio'"></h1>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card form-max">
        <div class="card-body">
            <form th:action="@{/admin/socios/guardar}" th:object="${socio}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Apellido</label>
                    <input type="text" th:field="*{apellido}" class="form-control" placeholder="Apellido" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">DNI</label>
                    <input type="text" th:field="*{dni}" class="form-control" placeholder="12345678" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Fecha de Nacimiento <span class="text-muted">(opcional)</span></label>
                    <input type="date" name="fechaNacimiento" class="form-control"
                           th:value="${socio.fechaNacimiento != null ? #temporals.format(socio.fechaNacimiento, 'yyyy-MM-dd') : ''}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email <span class="text-muted">(opcional)</span></label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="correo@ejemplo.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" th:field="*{telefono}" class="form-control" placeholder="Ej: 341 1234567">
                </div>
                <div class="mb-3">
                    <label class="form-label">Dirección</label>
                    <input type="text" th:field="*{direccion}" class="form-control" placeholder="Ej: San Martín 123">
                </div>

                <hr class="divider">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">Guardar</button>
                    <a href="/admin/socios/listar" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
    <a href="/admin/socios/listar" class="btn btn-secondary mt-3">← Volver al Listado</a>
</div>
</body>
</html>
