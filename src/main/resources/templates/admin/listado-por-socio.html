<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Inscripciones por socio</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
    <style>
        .accordion-item {
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm) !important;
            margin-bottom: .5rem;
            overflow: hidden;
        }
        .accordion-button {
            background: white;
            color: var(--gray-900);
            font-weight: 500;
            font-size: .925rem;
            padding: .85rem 1.1rem;
            display: flex;
            align-items: center;
            gap: .75rem;
        }
        .accordion-button:not(.collapsed) {
            background: var(--primary-light);
            color: var(--primary);
            box-shadow: none;
        }
        .accordion-button::after { margin-left: auto; }
        .accordion-body { padding: 0; }
        .subtotal-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .5rem 1.1rem;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-100);
            font-size: .8rem;
            color: var(--gray-500);
        }
        .sin-inscripciones {
            padding: .9rem 1.1rem;
            color: var(--gray-500);
            font-size: .875rem;
            font-style: italic;
        }
        .resumen-bar {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            padding: .75rem 1rem;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            font-size: .875rem;
        }
        .resumen-item strong { color: var(--primary); }
    </style>
    <script src="/js/darkmode.js"></script>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:56px"></a>
        <button class="btn-dark-toggle" title="Modo oscuro">🌙</button>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Inscripciones por socio</h1>
        <a href="/admin/listados/por-actividad" class="btn btn-secondary btn-sm">Ver por actividad →</a>
    </div>

    <!-- Resumen general -->
    <div class="resumen-bar">
        <span>Total socios: <strong th:text="${totalSocios}"></strong></span>
        <span>Total inscripciones: <strong th:text="${totalInscripciones}"></strong></span>
    </div>

    <div class="accordion" id="acordeonSocios">
        <div th:each="entrada, iterStat : ${mapa}" class="accordion-item">

            <h2 class="accordion-header">
                <button class="accordion-button collapsed"
                        type="button"
                        data-bs-toggle="collapse"
                        th:data-bs-target="'#socio-' + ${iterStat.index}"
                        th:aria-expanded="false">

                    <span style="font-weight:600"
                          th:text="${entrada.key.apellido + ', ' + entrada.key.nombre}"></span>

                    <span class="badge"
                          th:classappend="${entrada.value.isEmpty()} ? 'badge-gray' : 'badge-primary'"
                          th:text="${entrada.value.size() + ' actividad' + (entrada.value.size() == 1 ? '' : 'es')}"
                          style="margin-left:.5rem">
                    </span>

                    <span th:if="${!entrada.key.activo}"
                          class="badge badge-danger" style="margin-left:.4rem">Inactivo</span>
                </button>
            </h2>

            <div th:id="'socio-' + ${iterStat.index}"
                 class="accordion-collapse collapse"
                 data-bs-parent="#acordeonSocios">
                <div class="accordion-body">

                    <div th:if="${entrada.value.isEmpty()}" class="sin-inscripciones">
                        Sin inscripciones
                    </div>

                    <table th:unless="${entrada.value.isEmpty()}" class="table" style="margin:0">
                        <thead>
                            <tr>
                                <th>Actividad</th>
                                <th>Día</th>
                                <th>Horario</th>
                                <th>Profesor/a</th>
                                <th>Inscripto el</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="i : ${entrada.value}">
                                <td style="font-weight:500" th:text="${i.actividad.nombre}"></td>
                                <td th:text="${i.actividad.dia}"></td>
                                <td th:text="${#temporals.format(i.actividad.horario,'HH:mm')
                                             + ' - '
                                             + #temporals.format(i.actividad.horarioFin,'HH:mm')}"></td>
                                <td th:text="${i.actividad.profesor}"></td>
                                <td class="text-muted" th:text="${#temporals.format(i.fecha,'dd/MM/yyyy')}"></td>
                            </tr>
                        </tbody>
                    </table>

                    <div th:unless="${entrada.value.isEmpty()}" class="subtotal-bar">
                        <span>Subtotal: <strong th:text="${entrada.value.size()}"></strong>
                              <span th:text="${entrada.value.size() == 1 ? ' actividad' : ' actividades'}"></span>
                        </span>
                        <span class="text-muted" th:text="${entrada.key.email}"></span>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <a href="/admin/listados" class="btn btn-secondary mt-3">← Volver a listados</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
