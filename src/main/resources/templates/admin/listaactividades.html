<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARYEN · Actividades</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/admin/menu"><img src="/img/logo.svg" alt="Club Aryen" style="height:36px"></a>
    </div>
</nav>
<div class="container py-4">
    <div class="page-header">
        <h1 class="page-title">Actividades</h1>
        <a href="/admin/actividades/nuevo" class="btn btn-primary btn-sm">+ Nueva actividad</a>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

    <div class="card">
        <table class="table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Día</th>
                    <th>Horario</th>
                    <th>Profesor/a</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(actividades)}">
                    <td colspan="6" data-label="" style="text-align:center;color:var(--gray-500);padding:2rem">No hay actividades registradas</td>
                </tr>
                <tr th:each="a : ${actividades}">
                    <td data-label="Nombre" style="font-weight:500" th:text="${a.nombre}"></td>
                    <td data-label="Día" th:text="${a.dia}"></td>
                    <td data-label="Horario" th:text="${#temporals.format(a.horario,'HH:mm')}"></td>
                    <td data-label="Profesor/a" th:text="${a.profesor}"></td>
                    <td data-label="Estado">
                        <span th:if="${a.activo}" class="badge badge-success">Activa</span>
                        <span th:unless="${a.activo}" class="badge badge-danger">Inactiva</span>
                    </td>
                    <td class="td-actions">
                        <a th:href="@{/admin/actividades/editar/{id}(id=${a.id})}" class="btn btn-warning btn-sm">Editar</a>
                        <a th:href="@{/admin/actividades/eliminar/{id}(id=${a.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Desactivar esta actividad?')">Baja</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/admin/menu" class="btn btn-secondary mt-3">← Volver</a>
</div>
</body>
</html>
