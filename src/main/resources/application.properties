spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/clubaryen?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
server.port=9090
spring.thymeleaf.cache=false

# ── Mail (Mailtrap para desarrollo — reemplazar con cuenta real en producción) ──
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME:tu_usuario_mailtrap}
spring.mail.password=${MAIL_PASSWORD:tu_password_mailtrap}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Remitente
app.mail.from=noreply@clubaryen.com

# ── Bloqueo por intentos fallidos ──
app.login.max-intentos=3
app.login.bloqueo-minutos=30
