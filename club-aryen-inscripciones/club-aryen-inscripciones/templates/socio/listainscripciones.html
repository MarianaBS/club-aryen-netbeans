<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ARYEN · Mis Inscripciones</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/css/custom.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="container">
                <a class="navbar-brand" href="/socio/menu">ARYEN</a>
            </div>
        </nav>
        <div class="container py-4">
            <h4 class="mb-3">Mis inscripciones</h4>

            <div th:if="${#lists.isEmpty(inscripciones)}" class="alert alert-info">
                No estás inscripto en ninguna actividad todavía.
                <a th:href="@{/socio/actividades/listar}">Ver actividades disponibles</a>.
            </div>

            <table th:unless="${#lists.isEmpty(inscripciones)}" class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Actividad</th>
                        <th>Día</th>
                        <th>Horario</th>
                        <th>Profesor</th>
                        <th>Fecha inscripción</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${inscripciones}">
                        <td th:text="${i.actividad.nombre}"></td>
                        <td th:text="${i.actividad.dia}"></td>
                        <td th:text="${#temporals.format(i.actividad.horario, 'HH:mm')}"></td>
                        <td th:text="${i.actividad.profesor}"></td>
                        <td th:text="${#temporals.format(i.fecha, 'dd/MM/yyyy')}"></td>
                        <td>
                            <a th:href="@{/socio/inscripciones/eliminar/{id}(id=${i.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('¿Querés darte de baja de esta actividad?')">
                                Darme de baja
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

            <a href="/socio/actividades/listar" class="btn btn-primary mt-2">Ver más actividades</a>
            <a href="/socio/menu" class="btn btn-secondary mt-2">Volver al menú</a>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
